name: CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

  workflow_dispatch:

jobs:
  raspberry-pi4-preemptrt:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build the Raspberry Pi 4 PREEMPT_RT image
        run: ./kas-container --isar build kas/raspberry-pi4-preemptrt.yml

      - name: Archive the .wic image
        uses: actions/upload-artifact@v4
        with:
          name: raspberry-pi4-preemptrt
          path: build/tmp/deploy/images/rpi4/*.wic

  raspberry-pi4-evl:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build the Raspberry Pi 4 EVL image
        run: ./kas-container --isar build kas/raspberry-pi4-evl.yml

      - name: Archive the .wic image
        uses: actions/upload-artifact@v4
        with:
          name: raspberry-pi4-evl
          path: build/tmp/deploy/images/rpi4/*.wic

  # Unified builds supporting both board variants (1.2a and 1.3b) in single image
  starfive-visionfive2-preemptrt:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build the StarFive VisionFive2 PREEMPT_RT unified image
        run: ./kas-container --isar build kas/starfive-visionfive2-preemptrt.yml

      - name: Archive the .wic image
        uses: actions/upload-artifact@v4
        with:
          name: starfive-visionfive2-preemptrt
          path: build/tmp/deploy/images/starfive-visionfive2/*.wic

  starfive-visionfive2-evl:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build the StarFive VisionFive2 EVL unified image
        run: ./kas-container --isar build kas/starfive-visionfive2-evl.yml

      - name: Archive the .wic image
        uses: actions/upload-artifact@v4
        with:
          name: starfive-visionfive2-evl
          path: build/tmp/deploy/images/starfive-visionfive2/*.wic
